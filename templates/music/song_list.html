<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Music Player</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        .header {
            padding: 20px;
            background: #1a1a1a;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .search-box {
            text-align: center;
            padding: 20px;
            background: #161616;
        }

        .search-box input {
            width: 400px;
            max-width: 80%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .search-box button {
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #1db954;
            color: white;
            font-weight: bold;
            margin-left: 10px;
        }

        .search-box button:hover {
            opacity: 0.9;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .badge {
            display: inline-block;
            background: #1db954;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .artist {
            color: #aaa;
            margin-bottom: 15px;
        }

        audio {
            width: 100%;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="header">
    🎵 My Music App
</div>

<div class="search-box">
    <form method="GET">
        <input
            type="text"
            name="q"
            placeholder="🔍 Поиск песни или исполнителя..."
            value="{{ query|default:'' }}"
        >
        <button type="submit">Найти</button>
    </form>
</div>

<div class="container">

    {% for song in songs %}
    <div class="card">

        <div class="badge">TRACK</div>

        <div class="title">{{ song.title }}</div>

        <div class="artist">
            {{ song.artist }}
        </div>

        <audio controls>
            <source src="{{ song.audio_file.url }}">
            Ваш браузер не поддерживает аудио.
        </audio>

    </div>
    {% empty %}
    <div class="empty">
        Песни не найдены 🎵
    </div>
    {% endfor %}

</div>

</body>
</html>
